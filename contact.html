  <style>
    .success-toast {
      position: fixed;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%) translateY(20px);
      background: linear-gradient(90deg, rgba(47,180,91,0.12), rgba(31,94,54,0.06));
      border: 1px solid rgba(47,180,91,0.14);
      color: #06261a;
      padding: 14px 18px;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(18,45,28,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 420px;
      width: calc(100% - 48px);
      opacity: 0;
      pointer-events: none;
      transition: transform .28s ease, opacity .28s ease;
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      z-index: 1200;
    }
    .success-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .success-toast__icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg,#2FB45B,#1F5E36);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 700;
      flex: 0 0 40px;
    }
    .success-toast__content {
      flex: 1 1 auto;
      font-size: 14px;
      line-height: 1.2;
    }
    .success-toast__close {
      background: transparent;
      border: none;
      color: rgba(6,38,26,0.9);
      font-size: 18px;
      cursor: pointer;
      padding: 6px;
      line-height: 1;
    }
    .failure-toast {
      position: fixed;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%) translateY(20px);
      background: linear-gradient(90deg, rgba(247,174,49,0.10), rgba(238,60,55,0.06));
      border: 1px solid rgba(238,60,55,0.14);
      color: #2b1208;
      padding: 14px 18px;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(45,18,12,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 420px;
      width: calc(100% - 48px);
      opacity: 0;
      pointer-events: none;
      transition: transform .28s ease, opacity .28s ease;
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      z-index: 1200;
    }
    .failure-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
    .failure-toast__icon { width:40px; height:40px; border-radius:8px; display:grid; place-items:center; color:#2b1208; background: linear-gradient(135deg,#F7AE31,#EE3C37); font-weight:700; flex:0 0 40px; }
    .failure-toast__message { font-size:13px; opacity:0.95; }
    /* Ensure contact form fits shorter viewports and isn't covered by footer/pseudo-elements */
    .contact-page .contact-wrapper{
      padding: 48px 20px;
      margin-bottom: 120px;
      min-height: 60vh;
      box-sizing: border-box;
    }

    @media (max-height: 1100px){
      .contact-page .contact-wrapper{ padding-top:40px; padding-bottom:120px; }
    }

    @media (max-height: 900px){
      .contact-page .contact-wrapper{ padding-top:30px; padding-bottom:140px; min-height:55vh; }
    }

    @media (max-height: 820px){
      .contact-page .contact-wrapper{ padding-top:20px; padding-bottom:180px; min-height:50vh; }
    }
  </style>
</head>
<body class="page-contact">

  <!-- HEADER -->
  <div id="site-header"></div>
  <script src="assets/js/header-loader.js" defer></script>
  <script src="assets/js/header.js" defer=""></script>

 <!-- CONTACT SECTION -->
<section class="contact-page">
  <div class="contact-wrapper reveal">

    <h1 class="contact-title">Let’s get to the work</h1>
    <p class="contact-subtitle">
      We're here to make it happen. Let's create something extraordinary together.
    </p>

    <form id="contactForm" class="contact-form" action="https://formspree.io/f/xvzbrolq" method="POST">

      <div class="form-group">
        <input name="name" type="text" placeholder="Enter Full Name" required="">
      </div>

      <div class="form-group">
        <input name="email" type="email" placeholder="Enter Mail ID" required="">
      </div>

      <div class="form-group">
        <input name="phone" type="tel" placeholder="Enter Phone Number" required="">
      </div>

      <div class="form-group">
        <input name="company" type="text" placeholder="Enter Company Name">
      </div>

      <div class="form-group">
        <textarea name="message" placeholder="Tell us about your vision, how can we bring it to life?" required=""></textarea>
      </div>

      <label class="privacy-check">
        <input name="privacy" type="checkbox" required="">
        <span>I agree to Edikt Media’s privacy policy and terms</span>
      </label>

      <button type="submit" class="btn magic-btn btn-primary btn-large reveal delay-2">
        <span class="button__text">Make an Enquiry</span>
        <div class="button__filler"></div>
      </button>

    </form>

  </div>
</section>



  <!-- FOOTER -->
  <div id="site-footer"></div>
  <div id="successToast" class="success-toast" role="status" aria-live="polite" aria-hidden="true">
    <div class="success-toast__icon">✓</div>
    <div class="success-toast__content">
      <strong>Message sent!</strong>
      <div style="opacity:.95;font-size:13px">Thank you — we'll get back to you soon.</div>
    </div>
    <button class="success-toast__close" aria-label="Close message">✕</button>
  </div>
  <div id="failureToast" class="failure-toast" role="status" aria-live="polite" aria-hidden="true">
    <div class="failure-toast__icon">!</div>
    <div class="success-toast__content">
      <strong>Couldn't send</strong>
      <div class="failure-toast__message">There was a problem submitting the form. Please try again.</div>
    </div>
    <button class="failure-toast__close success-toast__close" aria-label="Close message">✕</button>
  </div>
  <script src="assets/js/script.js" defer=""></script>
  <script>
    (function(){
      var form = document.getElementById('contactForm');
      var successToast = document.getElementById('successToast');
      var failureToast = document.getElementById('failureToast');
      var hideTimer = null;
      var submitBtn = form.querySelector('button[type="submit"]');

      function showToast(el){
        if (!el) return;
        el.classList.add('show');
        el.setAttribute('aria-hidden','false');
        if (hideTimer) clearTimeout(hideTimer);
        hideTimer = setTimeout(function(){ hideToast(el); }, 4500);
      }

      function hideToast(el){
        if (!el) return;
        el.classList.remove('show');
        el.setAttribute('aria-hidden','true');
      }

      // close buttons
      document.querySelectorAll('.success-toast__close, .failure-toast__close').forEach(function(btn){
        btn.addEventListener('click', function(){
          var parent = btn.closest('.success-toast, .failure-toast');
          hideToast(parent);
        });
      });

      form.addEventListener('submit', function(e){
        e.preventDefault();
        if (submitBtn) { submitBtn.disabled = true; }

        var action = form.getAttribute('action') || window.location.href;
        var formData = new FormData(form);

        fetch(action, {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        }).then(function(response){
          if (response.ok) {
            showToast(successToast);
            form.reset();
          } else {
            // try to read json error message
            response.json().then(function(data){
              var message = (data && data.error) ? data.error : 'Submission failed. Please try again.';
              var msgEl = failureToast.querySelector('.failure-toast__message');
              if (msgEl) msgEl.textContent = message;
              showToast(failureToast);
            }).catch(function(){
              showToast(failureToast);
            });
          }
        }).catch(function(){
          showToast(failureToast);
        }).finally(function(){
          if (submitBtn) { submitBtn.disabled = false; }
        });
      });
    })();
  </script>



<script src="assets/js/scroll-reveal.js" defer=""></script>




</body></html>
